<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project work</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0d0d0e;
            color: white;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: #0d0d0e;
            position: sticky;
            top: 0;
        }

        .head h2 {
            font-size: 24px;
        }

        .head nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            transition: 0.3s;
        }

        .head nav a:hover {
            color: #ccc;
        }

        .focus-gallery {
            display: flex;
            overflow-x: scroll;
            scroll-snap-type: x mandatory;
            height: 100vh;
            align-items: center;
            padding: 0 calc(50vw-150px);
            margin-top: -130px;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

        .focus-gallery::-webkit-scrollbar {
            display: none;
        }

        .item {
            flex: 0 0 300px;
            height: 200px;
            margin-right: 170px;
            margin-left: 20px;
            scroll-snap-align: center;
            transition: transform 0.4s ease, opacity  0.4s ease;
        }

        .item:hover {
            transform: scale(1.3);
            opacity: 1;
        }

        .item img {
            width: 140%;
            height: 100%;
            object-fit:fill;
            border-radius: 20px;
            box-shadow: -10px 10px 10px gray;
        }
    </style>
</head>

<body>
    <header class="head">
        <h2>KRITIKA</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="project.html">Projects</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section>
        <div class="focus-gallery">
            <div class="item"><img src="projects/coffee.png" alt=""></div>
            <div class="item"><img src="projects/netflix.png" alt=""></div>
            <div class="item"><img src="projects/farmer.png" alt=""></div>
            <div class="item"><img src="projects/quiz.png" alt=""></div>
            <div class="item"><img src="projects/todoapp.png" alt=""></div>
        </div>
    </section>

</body>

</html>
