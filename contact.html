<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #202020;
    color: white;
    animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* HEADER */
.head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 8%;
    background: #0d0d0e;
    position: sticky;
    top: 0;
}

.head nav a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
    transition: 0.3s;
}

.head nav a:hover { color: #ccc; }

/* CONTACT SECTION */
.contact {
    text-align: center;
    padding-top: 50px;
}

.contact-btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: black;
    color: white;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    margin: 15px;
    font-size: 22px;
    transition: 0.3s;
    box-shadow: 0 0 10px #ffffff66;
    text-decoration: none;
}

.contact-btn:hover {
    transform: scale(1.15);
    box-shadow: 0 0 20px white, 0 0 40px white;
}

/* FORM */
form {
    max-width: 600px;
    margin: 40px auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.input, textarea {
    width: 100%;
    padding: 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 6px;
    font-size: 15px;
    transition: 0.3s;
}

.input:focus, textarea:focus {
    outline: none;
    border-color: white;
    box-shadow: 0 0 10px #ffffff55;
}

/* TEXTAREA */
textarea {
    height: 100px;
    resize: none;
}

/* BUTTON */
button {
    padding: 14px;
    background: white;
    color: black;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 10px #ffffff44;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 20px white, 0 0 40px #aaa;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: black;
    color: #aaa;
    margin-top: 40px;
}

/* MOBILE */
@media (max-width: 768px) {
    .head { flex-direction: column; }
    .head nav { margin-top: 10px; }
}
</style>
</head>

<body>

<header class="head">
    <h2>KRITIKA</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="project.html">Projects</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="contact">
    <h1>Let's Connect & Collaborate</h1><br>
    <h3>Whether it's a project, collaboration, or just to say hi — I'd love to hear from you!</h3><br>

    <div>
        <a href="https://github.com/kritika215" target="_blank" class="contact-btn"><i class="fab fa-github"></i></a>
        <a href="https://linkedin.com/in/kritika-goyal-b9522b289" target="_blank" class="contact-btn"><i class="fab fa-linkedin-in"></i></a>
        <a href="mailto:kritikagoyal215@gmail.com" class="contact-btn"><i class="fas fa-envelope"></i></a>
        <a href="https://wa.me/918685920748" target="_blank" class="contact-btn"><i class="fab fa-whatsapp"></i></a>
        <a href="https://instagram.com/_kritika_goyal21" target="_blank" class="contact-btn"><i class="fab fa-instagram"></i></a>
        <a href="tel:+918685920748" class="contact-btn"><i class="fas fa-phone"></i></a>
    </div>
</section>

<section>
    <form>
        <input type="text" class="input" placeholder="Your Name" required>
        <input type="text" class="input" placeholder="Subject" required>
        <textarea placeholder="Your Message..." required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<footer>
    © 2026 Kritika Goyal | Frontend Developer
</footer>

</body>
</html>
